bundle:
  name: pdf-parser-app

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog target for the pdf_parser schema, volume, and bronze table.
  schema:
    description: Schema under ${var.catalog}. Defaults to pdf_parser.
    default: pdf_parser
  volume:
    description: Volume under ${var.catalog}.${var.schema} where uploaded PDFs land.
    default: uploads
  warehouse_id:
    description: ID of the SQL warehouse the app binds to (ai_parse_document + Delta writes).
    lookup:
      warehouse: Serverless Starter Warehouse

targets:
  # NOTE: dev and prod intentionally point at the same workspace for now —
  # replace the `host:` and catalog values with the real prod target when
  # the prod workspace is provisioned.
  #
  # `host:` (vs `profile:`) is portable across machines — auth resolves
  # from the CLI's normal chain (env vars, OAuth/SSO, ~/.databrickscfg
  # matching by host) so customers don't need a specific named profile.
  dev:
    default: true
    mode: development
    workspace:
      host: https://fevm-fd-serverless-workspace.cloud.databricks.com
    variables:
      catalog: fd_serverless_workspace_catalog

  prod:
    mode: production
    workspace:
      host: https://fevm-fd-serverless-workspace.cloud.databricks.com  # TODO: replace with prod host
      root_path: /Workspace/Users/filipe.deo@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: fd_serverless_workspace_catalog  # TODO: replace with prod catalog

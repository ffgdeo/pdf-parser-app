bundle:
  name: pdf-parser-app

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog target for the pdf_parser schema, volume, and bronze table.
  schema:
    description: Schema under ${var.catalog}. Defaults to pdf_parser.
    default: pdf_parser
  volume:
    description: Volume under ${var.catalog}.${var.schema} where uploaded PDFs land.
    default: uploads
  warehouse_id:
    description: ID of the SQL warehouse the app binds to (ai_parse_document + Delta writes).
    lookup:
      warehouse: Serverless Starter Warehouse

targets:
  # Replace the placeholder hosts and catalog names with your own before
  # deploying. `${workspace.current_user.userName}` resolves to the user
  # the CLI is authenticated as, so the prod root_path doesn't need to be
  # hand-edited per deployer.
  #
  # `host:` (vs `profile:`) is portable across machines — auth resolves
  # from the CLI's normal chain (env vars, OAuth/SSO, ~/.databrickscfg
  # matching by host) so customers don't need a specific named profile.
  dev:
    default: true
    mode: development
    workspace:
      host: https://<your-workspace>.cloud.databricks.com
    variables:
      catalog: <your-catalog>

  prod:
    mode: production
    workspace:
      host: https://<your-prod-workspace>.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: <your-prod-catalog>
